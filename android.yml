# Updated Android Workflow

name: Android CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up JDK
      uses: actions/setup-java@v1
      with:
        java-version: '11'

    - name: Node.js Setup
      uses: actions/setup-node@v2
      with:
        node-version: '14'

    - name: Install Dependencies
      run: |
        cd android
        ./gradlew dependencies

    - name: Build with Gradle
      run: |
        cd android
        ./gradlew clean build --info --stacktrace || \
        { echo "Gradle build failed, please check the logs for more details."; exit 1; }

    - name: Run Tests
      run: |
        cd android
        ./gradlew test --info --stacktrace || \
        { echo "Test execution failed, please check the logs for more details."; exit 1; }

    - name: Publish Build Artifacts
      if: success()
      run: |
        echo 'Publishing artifacts'
        # Add commands to publish artifacts.
